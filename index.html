<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Nuker | Web Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0b0e14 0%, #0a0c10 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #e0e0e0;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        /* header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff99, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .badge {
            background: #1e2128;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            color: #aaa;
        }
        /* token & guild */
        .credentials {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: #111418cc;
            backdrop-filter: blur(4px);
            border: 1px solid #2c2f36;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .input-field {
            flex: 1;
            min-width: 240px;
        }
        .input-field label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #aaa;
        }
        .input-field input {
            width: 100%;
            background: #1a1d24;
            border: 1px solid #2c2f36;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            color: #00ff99;
            font-family: monospace;
            transition: 0.2s;
        }
        .input-field input:focus {
            outline: none;
            border-color: #00ff99;
            box-shadow: 0 0 8px #00ff9940;
        }
        /* controls row (name/count + apply button) */
        .controls-row {
            background: #0f1117;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1rem;
            border: 1px solid #2c2f36;
        }
        .ctrl-group {
            flex: 2;
            min-width: 160px;
        }
        .ctrl-group label {
            font-size: 0.8rem;
            color: #aaa;
            display: block;
            margin-bottom: 0.3rem;
        }
        .ctrl-group input {
            width: 100%;
            background: #1e2128;
            border: 1px solid #2c2f36;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            color: #00ff99;
        }
        .apply-btn {
            background: #2a2e3a;
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3a3e4a;
        }
        .apply-btn:hover {
            background: #00ff9922;
            border-color: #00ff99;
            color: #00ff99;
        }
        /* action buttons grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .action-btn {
            background: #151a22;
            border: 1px solid #2c2f36;
            padding: 1rem;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-btn:hover {
            background: #1e2530;
            border-color: #00ff99;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,255,153,0.1);
            color: #00ff99;
        }
        .danger {
            border-left: 3px solid #ff5555;
        }
        .danger:hover {
            border-color: #ff5555;
            color: #ff8888;
        }
        /* status area */
        .status-area {
            background: #0a0c10;
            border-radius: 20px;
            padding: 1.2rem;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            border: 1px solid #2c2f36;
            backdrop-filter: blur(2px);
        }
        .status-text {
            color: #00ff99;
            word-break: break-word;
        }
        .error-text {
            color: #ff7777;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #555;
        }
        hr {
            border-color: #2c2f36;
            margin: 1rem 0;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .buttons-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ SERVER NUKER ⚡</h1>
        <div class="badge">WEB EDITION | Full Control</div>
    </div>

    <div class="credentials">
        <div class="input-field">
            <label>🤖 BOT TOKEN</label>
            <input type="password" id="token" placeholder="OD...YjI" autocomplete="off">
        </div>
        <div class="input-field">
            <label>🆔 SERVER ID</label>
            <input type="text" id="guildId" placeholder="123456789012345678">
        </div>
    </div>

    <div class="controls-row">
        <div class="ctrl-group">
            <label>🏷️ NAME (for channels/roles)</label>
            <input type="text" id="customName" placeholder="nuked-channel">
        </div>
        <div class="ctrl-group">
            <label>🔢 COUNT (default 20)</label>
            <input type="number" id="customCount" value="20" step="1" min="1" max="200">
        </div>
        <button id="applyDefaultsBtn" class="apply-btn">✓ تطبيق العدد / الاسم</button>
    </div>

    <div class="buttons-grid">
        <button class="action-btn" data-action="deleteChannels">🗑️ حذف كل القنوات</button>
        <button class="action-btn" data-action="createChannels">📁 إنشاء قنوات (عدد)</button>
        <button class="action-btn" data-action="createChannelsPing">🔔 إنشاء قنوات + منشن</button>
        <button class="action-btn" data-action="deleteRoles">🎭 حذف كل الرتب</button>
        <button class="action-btn" data-action="createRoles">👑 إنشاء رتب (عدد)</button>
        <button class="action-btn" data-action="deleteEmojis">😀 حذف كل الإيموجيات</button>
        <button class="action-btn" data-action="deleteStickers">🖼️ حذف كل الملصقات</button>
        <button class="action-btn danger" data-action="banAll">⛔ حظر (Ban) الكل</button>
        <button class="action-btn danger" data-action="kickAll">👢 طرد (Kick) الكل</button>
    </div>

    <div class="status-area">
        <div id="status" class="status-text">✅ جاهز... أدخل التوكن و ID السيرفر</div>
    </div>
    <div class="footer">
        ⚠️ للأغراض التعليمية | تأكد من صلاحيات البوت (Admin) وتفعيل Gateway Intents<br>
        🔗 الخادم يعمل على <span id="serverUrl">http://localhost:3000</span>
    </div>
</div>

<script>
    const tokenInput = document.getElementById('token');
    const guildIdInput = document.getElementById('guildId');
    const statusDiv = document.getElementById('status');
    const customNameInput = document.getElementById('customName');
    const customCountInput = document.getElementById('customCount');

    // إظهار رابط الخادم الحالي
    document.getElementById('serverUrl').innerText = window.location.origin;

    // اختبار الاتصال بالخادم عند تحميل الصفحة
    async function testConnection() {
        try {
            const res = await fetch('/api/test');
            const data = await res.json();
            if (res.ok) {
                statusDiv.innerHTML = `✅ متصل بالخادم: ${data.message}`;
                statusDiv.classList.remove('error-text');
            } else {
                throw new Error('Response not ok');
            }
        } catch (err) {
            statusDiv.innerHTML = `❌ لا يمكن الاتصال بالخادم. تأكد من تشغيله باستخدام "node server.js" على المنفذ 3000. خطأ: ${err.message}`;
            statusDiv.classList.add('error-text');
        }
    }

    // تنفيذ الإجراء
    async function executeAction(action, params = {}) {
        const token = tokenInput.value.trim();
        const guildId = guildIdInput.value.trim();
        if (!token || !guildId) {
            statusDiv.innerHTML = '❌ من فضلك أدخل التوكن و ID السيرفر أولاً';
            statusDiv.classList.add('error-text');
            return;
        }
        statusDiv.innerHTML = `⏳ جاري تنفيذ "${action}" ... (قد يستغرق وقتاً)`;
        statusDiv.classList.remove('error-text');
        try {
            const response = await fetch('/api/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, guildId, action, params })
            });
            const data = await response.json();
            if (response.ok) {
                statusDiv.innerHTML = `✅ تم بنجاح: ${data.message || 'اكتمل التنفيذ'}`;
                statusDiv.classList.remove('error-text');
            } else {
                statusDiv.innerHTML = `❌ خطأ: ${data.error || 'فشل الطلب'}`;
                statusDiv.classList.add('error-text');
            }
        } catch (err) {
            statusDiv.innerHTML = `❌ فشل الاتصال بالخادم: ${err.message}. تأكد من تشغيل الخادم (node server.js)`;
            statusDiv.classList.add('error-text');
        }
    }

    // ربط الأزرار بالأوامر
    document.querySelectorAll('.action-btn[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.getAttribute('data-action');
            let params = {};
            if (action === 'createChannels' || action === 'createChannelsPing') {
                params.name = customNameInput.value.trim() || 'nuked-channel';
                params.count = parseInt(customCountInput.value) || 20;
            } else if (action === 'createRoles') {
                params.roleName = customNameInput.value.trim() || 'nuked-role';
                params.roleCount = parseInt(customCountInput.value) || 20;
            }
            executeAction(action, params);
        });
    });

    // زر تطبيق العدد والاسم
    document.getElementById('applyDefaultsBtn').addEventListener('click', () => {
        const name = customNameInput.value.trim() || '(افتراضي)';
        const count = customCountInput.value || '20';
        statusDiv.innerHTML = `🔧 تم ضبط الاسم: "${name}" والعدد: ${count}`;
        statusDiv.classList.remove('error-text');
    });

    // اختبار الاتصال عند التحميل
    testConnection();
</script>
</body>
</html>
